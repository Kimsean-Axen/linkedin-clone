<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — LinkedIn Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>body { background:#fff; min-height:100vh; display:flex; flex-direction:column; }</style>
</head>
<body>
<nav style="height:56px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;padding:0 32px;">
    <a href="/"><span class="linkedin-logo lg">in</span></a>
</nav>

<div class="d-flex flex-column align-items-center justify-content-center flex-grow-1 py-5 px-3">
    <div style="width:100%;max-width:440px;">
        <h1 style="font-size:32px;font-weight:700;color:#191919;margin-bottom:6px;">Sign in</h1>
        <p style="color:#666;margin-bottom:28px;">Stay updated on your professional world</p>

        {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-danger py-2 mb-3">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus>
            </div>
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="loginPassword" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="showLoginPassword" onchange="document.getElementById('loginPassword').type = this.checked ? 'text' : 'password';">
                <label class="form-check-label" for="showLoginPassword" style="font-size:13px;">Show password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="height:46px;font-size:15px;border-radius:24px;justify-content:center;">Sign in</button>
        </form>

        <div class="divider-text my-4">New to LinkedIn Clone?</div>

        <a href="/register/" class="btn btn-outline-primary w-100" style="height:46px;font-size:15px;justify-content:center;">Join now</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
